# ============================================
# Docker 镜像构建模板 - 生产环境标准配置
# ============================================
# 包含：自动重试、缓存优化、智能标签、多环境支持
# 版本: 2.0
# ============================================

# Docker 构建基础模板 - 生产环境标准
.docker_build_base:
  image: $DOCKER_IMAGE
  # 自动化重试机制 - 网络异常时自动重试
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  variables:
    CI_DEBUG_TRACE: "false"
    GIT_CHECKOUT: "true"
  # 证书配置
  before_script:
    - |
      echo "========================================="
      echo "Docker 镜像构建开始 - $(date +'%Y-%m-%d %H:%M:%S')"
      echo "========================================="
      docker version
      echo "工作目录: $(pwd)"
      echo "镜像 Registry: $CI_REGISTRY"
      echo "========================================="
  # 构建后处理
  after_script:
    - |
      echo "========================================="
      echo "Docker 镜像构建完成 - $(date +'%Y-%m-%d %H:%M:%S')"
      echo "========================================="
  cache:
    policy: push

# ============================================
# Docker 镜像构建并推送模板
# ============================================
.docker_upload:
  extends: .docker_build_base
  stage: build
  when: on_success
  tags:
    - build
  only: #  表示只有 master 分支或创建 tag 时才会触发此 job
    - master
    - tags
  dependencies:
    - mvn_build
  script:
    - |
      echo "========================================="
      echo "开始构建 Docker 镜像"
      echo "========================================="
      
      # 确定镜像标签策略
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAG=$CI_COMMIT_TAG
        echo "使用 Tag: $IMAGE_TAG"
      elif [ "$CI_COMMIT_BRANCH" = "master" ] || [ "$CI_COMMIT_BRANCH" = "main" ]; then
        IMAGE_TAG="latest"
        echo "分支构建 - 使用 latest 标签"
      else
        IMAGE_TAG=$CI_COMMIT_SHORT_SHA
        echo "特性分支构建 - 使用短 SHA 标签"
      fi
      
      # 动态生成镜像名称
      CI_REGISTRY_FULL_IMAGE="$CI_REGISTRY/$CI_REGISTRY_IMAGE:$IMAGE_TAG"
      echo "Dockerfile: ${DOCKERFILE_PATH:-Dockerfile}"
      echo "镜像名称: $CI_REGISTRY_FULL_IMAGE"
      echo "========================================="
      
      # Docker 登录（带重试机制）
      for i in 1 2 3; do
        echo "Docker 登录尝试 $i/3..."
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY && break || {
          if [ $i -eq 3 ]; then echo "Docker 登录失败"; exit 1; fi
          echo "登录失败，2秒后重试..."
          sleep 2
        }
      done
      
      # 构建镜像（带构建参数）
      echo "开始构建镜像..."
      docker build \
        --force-rm \
        --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
        --build-arg VCS_REF=$CI_COMMIT_SHA \
        --build-arg VERSION=$CI_COMMIT_SHORT_SHA \
        -f ${DOCKERFILE_PATH:-Dockerfile} \
        -t $CI_REGISTRY_FULL_IMAGE .
      echo "镜像构建成功"
      
      # 推送镜像
      echo "开始推送镜像..."
      docker push $CI_REGISTRY_FULL_IMAGE
      echo "镜像推送成功"
      echo "========================================="
      echo "构建成功！镜像地址: $CI_REGISTRY_FULL_IMAGE"
      echo "========================================="
      
      # 清理本地镜像（释放空间）
      echo "清理本地镜像..."
      docker rmi -f $CI_REGISTRY_FULL_IMAGE || true
      echo "构建任务完成"

