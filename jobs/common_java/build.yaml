# ============================================
# Java Docker 镜像构建推送
# ============================================

.docker_build:
  stage: build
  when: on_success
  before_script:
    - |
      echo "========================================="
      echo "Docker 镜像构建开始 - $(date +'%Y-%m-%d %H:%M:%S')"
      echo "========================================="
      docker version
      echo "工作目录: $(pwd)"
      echo "镜像 Registry: $CI_REGISTRY"
      echo "========================================="
  script:
    - |
      echo "========================================="
      echo "开始构建 Docker 镜像"
      echo "========================================="
      
      # 确定镜像标签策略（与 deploy.yaml 保持一致）
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAG=$CI_COMMIT_TAG
        echo "正式发布 - 使用 Tag: $IMAGE_TAG"
      else
        IMAGE_TAG="${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
        echo "非生产环境 - 使用分支标签: $IMAGE_TAG"
      fi
      
      CI_REGISTRY_FULL_IMAGE="$CI_REGISTRY/$CI_REGISTRY_IMAGE:$IMAGE_TAG"
      echo "Dockerfile: ${DOCKERFILE_PATH:-Dockerfile}"
      echo "镜像名称: $CI_REGISTRY_FULL_IMAGE"
      echo "========================================="
      
      # Docker 登录
      for i in 1 2 3; do
        echo "Docker 登录尝试 $i/3..."
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY && break || {
          if [ $i -eq 3 ]; then echo "Docker 登录失败"; exit 1; fi
          echo "登录失败，2秒后重试..."
          sleep 2
        }
      done
      
      # 构建镜像
      echo "开始构建镜像..."
      docker build \
        --force-rm \
        --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
        --build-arg VCS_REF=$CI_COMMIT_SHA \
        --build-arg VERSION=$CI_COMMIT_SHORT_SHA \
        -f ${DOCKERFILE_PATH:-Dockerfile} \
        -t $CI_REGISTRY_FULL_IMAGE .
      echo "镜像构建成功"
      
      # 推送镜像
      echo "开始推送镜像..."
      PUSH_SUCCESS=false
      for i in 1 2 3; do
        echo "推送尝试 $i/3..."
        if docker push $CI_REGISTRY_FULL_IMAGE; then
          PUSH_SUCCESS=true
          break
        else
          if [ $i -eq 3 ]; then
            echo "推送失败，已达最大重试次数"
          else
            echo "推送失败，2秒后重试..."
            sleep 2
          fi
        fi
      done
      
      if [ "$PUSH_SUCCESS" = true ]; then
        echo "镜像推送成功"
        echo "========================================="
        echo "构建成功！镜像地址: $CI_REGISTRY_FULL_IMAGE"
        echo "========================================="
      else
        echo "========================================="
        echo "镜像推送失败！"
        echo "镜像地址: $CI_REGISTRY_FULL_IMAGE"
        echo "========================================="
        exit 1
      fi
      
      echo "清理本地镜像: $CI_REGISTRY_FULL_IMAGE"
      docker rmi -f $CI_REGISTRY_FULL_IMAGE || true
  after_script:
    - |
      echo "========================================="
      echo "Docker 镜像构建完成 - $(date +'%Y-%m-%d %H:%M:%S')"
      echo "========================================="
  cache:
    policy: push
  needs: ["package"]
