# ============================================
# Java Maven 测试 - JaCoCo 覆盖率
# ============================================

.test:
  stage: test
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  before_script:
    - |
      echo "========================================="
      echo "测试开始 - $(date +'%Y-%m-%d %H:%M:%S')"
      echo "========================================="
      echo "测试命令: $TEST_SHELL"
      echo "测试报告路径: $JUNIT_REPORT_PATH"
      java -version 2>&1 | head -1
      mvn -version 2>&1 | head -1
      echo "========================================="
  script:
    - |
      echo "========================================="
      echo "开始执行测试"
      echo "========================================="
      $TEST_SHELL
      TEST_RESULT=$?
      echo "========================================="
      if [ $TEST_RESULT -eq 0 ]; then
        echo "测试通过 ✓"
      else
        echo "测试失败 ✗"
        echo "========================================="
        exit 1
      fi
  after_script:
    - |
      echo "========================================="
      echo "测试完成 - $(date +'%Y-%m-%d %H:%M:%S')"
      echo "========================================="
      echo "测试报告文件:"
      if [ -d "$JUNIT_REPORT_PATH" ]; then
        ls -la $JUNIT_REPORT_PATH || echo "报告目录为空"
      else
        echo "报告目录不存在: $JUNIT_REPORT_PATH"
      fi
      echo "========================================="
  artifacts:
    reports:
      junit: ${JUNIT_REPORT_PATH}TEST-*.xml
      coverage_report:
        coverage_format: jacoco
        path: target/site/jacoco/jacoco.xml
    when: always
    expire_in: 7 days
    paths:
      - ${JUNIT_REPORT_PATH}
      - target/site/jacoco/
  cache:
    policy: pull-push
    key: "maven-${CI_COMMIT_REF_SLUG}"
    paths:
      - .m2/repository
