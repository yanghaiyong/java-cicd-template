# ============================================
# Java Maven 构建模板 - 生产环境标准配置
# ============================================
# 包含：自动重试、缓存优化、构建验证、多环境支持
# 版本: 2.0
# ============================================

# Maven 构建基础模板 - 生产环境标准
.mvn_build:
  image: $MAVEN_IMAGE
  stage: package
  tags:
    - package
  # 自动化重试机制 - 网络异常时自动重试
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  # 构建前准备
  before_script:
    - "echo ========================================="
    - "echo Maven 构建开始 - $(date +'%Y-%m-%d %H:%M:%S')"
    - "echo 构建命令: $BUILD_SHELL"
    - "echo Java 版本: $(java -version 2>&1 | head -1)"
    - "echo Maven 版本: $(mvn -version 2>&1 | head -1)"
    - "echo ========================================="
    - "mkdir -p ~/.m2/repository"
    - "echo 工作目录: $(pwd)"
    - "echo 磁盘空间: $(df -h . | tail -1)"
  # 执行构建
  script:
    - "$BUILD_SHELL"
  # 构建后处理
  after_script:
    - "echo ========================================="
    - "echo Maven 构建完成 - $(date +'%Y-%m-%d %H:%M:%S')"
    - "echo ========================================="
    - "ls -lh $ARTIFACTS.jar 2>/dev/null || echo 未找到 JAR 文件"
    - "ls -la $CACHE_DIR"
  # variables 已提取到 templates/java-pipeline.yaml 统一管理
  # 构建产物管理,保存产物在ui界面，通过needs可以传递给下游job
  artifacts:
    name: '$ARTIFACTS_NAME'
    when: on_success
    expire_in: 30 days
    paths:
      - ${ARTIFACTS}*.jar
    expose_as: "构建产物"
  # Maven 本地仓库缓存策略 - 按分支隔离
  cache:
    policy: pull-push # 默认逻辑job开始之前下载,job结束上传；push:不下载只上传；pull:只下载
    key: "maven-${CI_COMMIT_REF_SLUG}"
    paths:
      - ~/.m2/repository # Maven 依赖（第三方 JAR）
      - ${CACHE_DIR}     # 构建产物（编译后的 class/jar）

