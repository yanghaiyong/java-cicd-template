# ============================================
# Vue/NPM 构建
# ============================================

.npm_package:
  stage: package
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  before_script:
    - |
      echo "========================================="
      echo "NPM 构建开始 - $(date +'%Y-%m-%d %H:%M:%S')"
      echo "========================================="
      echo "构建命令: $NPM_BUILD_SHELL"
      node -v
      npm -v
      echo "工作目录: $(pwd)"
      echo "磁盘空间: $(df -h . | tail -1)"
  script:
    - "eval $NPM_BUILD_SHELL"
  after_script:
    - |
      echo "========================================="
      echo "NPM 构建完成 - $(date +'%Y-%m-%d %H:%M:%S')"
      echo "========================================="
      ls -lh ${ARTIFACTS} 2>/dev/null || echo "未找到构建产物"
  artifacts:
    name: '$ARTIFACTS_NAME'
    when: on_success
    expire_in: 30 days
    paths:
      - ${ARTIFACTS}
  cache:
    policy: pull-push
    key: "npm-${CI_COMMIT_REF_SLUG}"
    paths:
      - ${CACHE_DIR}
