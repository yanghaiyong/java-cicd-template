# ============================================
# Java 测试模板 - 生产环境标准配置
# ============================================
# 版本: 2.0
# ============================================

.test:
  output_limit: 16384
  stage: test
  tags:
    - test
  # 自动化重试机制 - 网络异常时自动重试
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  dependencies:
    - mvn_build
  variables:
    CI_DEBUG_TRACE: "false"
    GIT_CHECKOUT: "true"
  # 测试前准备
  before_script:
    - |
      echo "========================================="
      echo "测试开始 - $(date +'%Y-%m-%d %H:%M:%S')"
      echo "========================================="
      echo "测试命令: $TEST_SHELL"
      echo "测试报告路径: $JUNIT_REPORT_PATH"
      java -version 2>&1 | head -1
      mvn -version 2>&1 | head -1
      echo "========================================="
  # 执行测试
  script:
    - |
      echo "========================================="
      echo "开始执行测试"
      echo "========================================="
      
      # 执行测试（包含 JaCoCo 覆盖率）
      mvn test jacoco:report -B -U -f pom.xml -s settings.xml
      TEST_RESULT=$?
      
      echo "========================================="
      if [ $TEST_RESULT -eq 0 ]; then
        echo "测试通过 ✓"
      else
        echo "测试失败 ✗"
        echo "========================================="
        exit 1
      fi
  # 测试后处理
  after_script:
    - |
      echo "========================================="
      echo "测试完成 - $(date +'%Y-%m-%d %H:%M:%S')"
      echo "========================================="
      echo "测试报告文件:"
      ls -la $JUNIT_REPORT_PATH
      echo "========================================="
  # 测试报告
  artifacts:
    reports:
      junit: ${JUNIT_REPORT_PATH}TEST-*.xml
      coverage_report:
        coverage_format: jacoco
        path: target/site/jacoco/jacoco.xml
    when: always
    expire_in: 7 days
    paths:
      - ${JUNIT_REPORT_PATH}
      - target/site/jacoco/
  # Maven 缓存策略
  cache:
    policy: pull-push
    key: "maven-${CI_COMMIT_REF_SLUG}"
    paths:
      - .m2/repository
