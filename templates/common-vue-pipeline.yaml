# ============================================
# 通用 Vue/前端 CI/CD 流水线模板
# ============================================
# 基于分支自动识别环境：develop -> test -> master -> tag
#
# 使用方式：
#   在项目 .gitlab-ci.yml 中:
#   include:
#     - template: common-vue-pipeline.yaml
# ============================================

include:
  - project: 'cidevops/java-cicd-template'
    ref: master
    file: 'jobs/common_vue/package.yaml'
  - project: 'cidevops/java-cicd-template'
    ref: master
    file: 'jobs/common_vue/build.yaml'
  - project: 'cidevops/java-cicd-template'
    ref: master
    file: 'jobs/common_vue/deploy.yaml'

variables:
  # ============================================
  # 统一镜像变量
  # ============================================
  NODE_IMAGE: "node:20-alpine"
  DOCKER_IMAGE: "docker:cli"
  KUBECTL_IMAGE: "bitnami/kubectl:latest"
  
  # ============================================
  # 通用 CI 变量
  # ============================================
  CI_DEBUG_TRACE: "false"
  GIT_CHECKOUT: "true"
  
  # ============================================
  # NPM 构建相关变量
  # ============================================
  NPM_BUILD_SHELL: "npm install && npm run build"
  ARTIFACTS: "dist/"
  CACHE_DIR: "node_modules/"
  ARTIFACTS_NAME: '$CI_JOB_NAME-$CI_COMMIT_REF_NAME'
  
  # ============================================
  # Docker 相关变量
  # ============================================
  DOCKERFILE_PATH: "Dockerfile"
  CI_REGISTRY_USER: "admin"
  CI_REGISTRY_PASSWORD: "admin"
  CI_REGISTRY: "k8s-node-1:5000"
  CI_REGISTRY_IMAGE: "$CI_PROJECT_PATH_SLUG"
  CI_REGISTRY_FULL_IMAGE: "$CI_REGISTRY/$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  
  # ============================================
  # K8s 部署相关变量
  # ============================================
  APP_NAME: "$CI_PROJECT_NAME"
  
  # K8s 路径配置
  K8S_BASE_PATH: "k8s"
  K8S_ENV: "dev"
  K8S_FILE: "deploy.yaml"
  
  # K8s 默认配置 (可被 rules 覆盖)
  K8S_NAMESPACE: 'app-${K8S_ENV}'
  
  # K8s 默认配置
  REPLICAS: "2"
  MAX_SURGE: "1"
  MAX_UNAVAILABLE: "0"
  
  # 容器配置
  SERVICE_TYPE: "ClusterIP"
  SERVICE_PORT: "80"
  CONTAINER_PORT: "80"
  IMAGE_PULL_POLICY: "Always"
  IMAGE_PULL_SECRETS: "docker-secret"
  # Docker Registry 认证配置（base64编码的 dockerconfigjson）
  # 格式: echo -n '{"auths":{"k8s-node-1:5000":{"auth":"YWRtaW46YWRtaW4="}}}' | base64 -w 0
  DOCKER_CONFIG: "eyJhdXRocyI6eyJrOHMtbm9kZS0xOjUwMDAiOnsiYXV0aCI6IllXUnRhVzQ2WVdSdGFXND0ifX19"
  
  # 资源配置
  MEMORY_REQUEST: "64Mi"
  CPU_REQUEST: "50m"
  MEMORY_LIMIT: "128Mi"
  CPU_LIMIT: "200m"
  
  # 健康检查
  HEALTH_CHECK_PATH: "/health"
  LIVENESS_INITIAL_DELAY: "10"
  READINESS_INITIAL_DELAY: "5"
  
  # HPA配置
  HPA_MIN_REPLICAS: "2"
  HPA_MAX_REPLICAS: "10"
  HPA_CPU_THRESHOLD: "70"
  HPA_MEMORY_THRESHOLD: "80"
  HPA_SCALE_DOWN_WINDOW: "300"
  
  # Ingress 配置
  INGRESS_HOST: "www.example.com"

cache:
  paths:
    - ${CACHE_DIR}

stages:
  - package
#  - build
#  - deploy

package:
  stage: package
  extends: .npm_package
  image: $NODE_IMAGE
  tags:
    - package

