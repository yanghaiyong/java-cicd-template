include:
  - project: 'cidevops/java-cicd-template'
    ref: master
    file: 'jobs/debug-cert.yaml'
  - project: 'cidevops/java-cicd-template'
    ref: master
    file: 'jobs/package.yaml'
  - project: 'cidevops/java-cicd-template'
    ref: master
    file: 'jobs/build.yaml'
  - project: 'cidevops/java-cicd-template'
    ref: master
    file: 'jobs/test.yaml'
  - project: 'cidevops/java-cicd-template'
    ref: master
    file: 'jobs/deploy.yaml'


variables:
  # ============================================
  # 统一镜像变量 - 在此集中管理所有 Docker 镜像
  # ============================================
  MAVEN_IMAGE: "maven:3.9.4-eclipse-temurin-17"
  DOCKER_IMAGE: "docker:cli"
  KUBECTL_IMAGE: "bitnami/kubectl:latest"
  SKYWALKING_AGENT_IMAGE: "apache/skywalking-java-agent:9.6.0-java17"
  
  # ============================================
  # 构建相关变量
  # ============================================
  CACHE_DIR: 'SpringBootCache/RedisCacheBoot/target/'
  ARTIFACTS: 'SpringBootCache/RedisCacheBoot/target/'
  BUILD_SHELL: 'mvn clean package -B -DskipTests -f pom.xml -s settings.xml' # 'mvn clean package -B -U -DskipTests -f pom.xml -s settings.xml'
  TEST_SHELL: 'mvn test -B -U -f pom.xml -s settings.xml'
  JUNIT_REPORT_PATH: 'target/surefire-reports/'
  
  # ============================================
  # Maven 构建优化变量 - 统一配置
  # ============================================
  # Maven JVM 参数：分层编译 + 内存配置
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository -XX:+TieredCompilation -XX:TieredStopAtLevel=1 -Xms512m -Xmx1024m"
  DOCKERFILE_PATH: "SpringBootCache/RedisCacheBoot/src/main/docker/Dockerfile"
  K8S_YAML: "SpringBootCache/k8s/dev/cache-redis-boot.yaml"
  ARTIFACTS_NAME: '$CI_JOB_NAME-$CI_COMMIT_REF_NAME'

  # ============================================
  # Docker Registry 配置
  # ============================================
  CI_REGISTRY_USER: "admin"
  CI_REGISTRY_PASSWORD: "admin"
  CI_REGISTRY: "k8s-node-1:5000"
  CI_REGISTRY_IMAGE: "cache-redis-boot"
  CI_REGISTRY_FULL_IMAGE: "$CI_REGISTRY/$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" # 全路径镜像名称

  # ============================================
  # Kubernetes 部署配置
  # ============================================
  APP_NAME: "cache-redis-boot"
  K8S_NAMESPACE: "default"

  #CI_COMMIT_MESSAGE
  #CI_COMMIT_SHORT_SHA
  #CI_COMMIT_SHA  当前提交的 SHA-1 哈希值
  #CI_COMMIT_REF_NAME 当前提交的分支或标签名称
  #CI_COMMIT_REF_SLUG 当前分支或标签的 slug 版本（通常用于生成文件名）
  #CI_COMMIT_TAG 当前提交的标签名称
  #CI_COMMIT_BRANCH 当前提交的分支名称
  #CI_JOB_ID  当前 Job 的唯一 ID
  #CI_BUILDS_DIR
  #CI_PROJECT_DIR 项目的完整路径
  #CI_PROJECT_PATH  项目的完整路径，格式为：组/项目名称
  #CI_PROJECT_URL 项目的 URL


cache:
  paths:
    - ${CACHE_DIR}

stages:
  - debug-cert
  - package
  - test
  - build
  - deploy
debug-cert:
  stage: debug-cert
  extends: .debug-cert
  image: $MAVEN_IMAGE

mvn_build:
  stage: package
  extends: .mvn_build
  image: $MAVEN_IMAGE

test:
  stage: test
  extends: .test
  image: $MAVEN_IMAGE
  needs: ["mvn_build"]

docker_upload:
  stage: build
  extends: .docker_upload
  image: $DOCKER_IMAGE
  needs: ["mvn_build"]

k8s_deploy:
  stage: deploy
  extends: .k8s_deploy
  image:
    name: $KUBECTL_IMAGE
    entrypoint: [ "" ]
  needs: ["docker_upload"]
